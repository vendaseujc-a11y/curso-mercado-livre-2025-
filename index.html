<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Mercado Livre 2025-2026 - Guia Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --accent: #00f5d4;
            --accent-secondary: #7b2cbf;
            --accent-gradient: linear-gradient(135deg, #00f5d4, #00bbf9);
            --pink: #f72585;
            --purple: #7b2cbf;
            --blue: #00bbf9;
            --cyan: #00f5d4;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --border: rgba(255,255,255,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(123,44,191,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,245,212,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(247,37,133,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        
        .header {
            background: linear-gradient(180deg, rgba(123,44,191,0.3) 0%, transparent 100%);
            padding: 50px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        
        .header h1 {
            font-size: 3em;
            font-weight: 800;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        
        .header p {
            font-size: 1.15em;
            color: var(--text-muted);
            font-weight: 400;
        }
        
        .badge {
            display: inline-block;
            background: rgba(0,245,212,0.15);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(0,245,212,0.3);
        }
        
        .container {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .progress-track {
            background: rgba(255,255,255,0.05);
            height: 4px;
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            background: var(--accent-gradient);
            height: 100%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(0,245,212,0.5);
        }
        
        .slide-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5),
                0 0 0 1px var(--border);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .slide-header {
            background: linear-gradient(90deg, var(--purple), var(--pink));
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .slide-header .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .slide-header .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            backdrop-filter: blur(10px);
        }
        
        .slide-header h2 {
            font-size: 1.25em;
            font-weight: 600;
        }
        
        .slide-header .subtitle {
            font-size: 0.9em;
            opacity: 0.85;
            margin-top: 3px;
        }
        
        .slide-header .slide-counter {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .slide-body {
            padding: 42px;
            min-height: 520px;
        }
        
        .slide-title {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .slide-title i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .content h3 {
            color: var(--cyan);
            font-size: 1.35em;
            margin: 32px 0 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .content h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }
        
        .content p {
            color: var(--text-muted);
            font-size: 1.08em;
            margin-bottom: 16px;
            line-height: 1.75;
        }
        
        .content ul, .content ol {
            margin: 16px 0 20px 28px;
        }
        
        .content li {
            color: var(--text-muted);
            margin-bottom: 14px;
            font-size: 1.05em;
            line-height: 1.6;
        }
        
        .content strong {
            color: var(--text);
        }
        
        .box {
            padding: 22px 26px;
            border-radius: 16px;
            margin: 24px 0;
            border: 1px solid;
            backdrop-filter: blur(10px);
        }
        
        .box-dica {
            background: rgba(0,245,212,0.08);
            border-color: rgba(0,245,212,0.3);
        }
        
        .box-dica h4 { color: var(--cyan); }
        
        .box-atencao {
            background: rgba(247,37,133,0.08);
            border-color: rgba(247,37,133,0.3);
        }
        
        .box-atencao h4 { color: var(--pink); }
        
        .box-info {
            background: rgba(0,187,249,0.08);
            border-color: rgba(0,187,249,0.3);
        }
        
        .box-info h4 { color: var(--blue); }
        
        .box h4 {
            font-size: 1.05em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 22px 0;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        th {
            background: linear-gradient(90deg, var(--purple), var(--pink));
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }
        
        tr:hover { background: rgba(255,255,255,0.03); }
        
        tr:last-child td { border-bottom: none; }
        
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 24px 32px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
        }
        
        .nav button {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Outfit', sans-serif;
        }
        
        .nav .prev {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }
        
        .nav .prev:hover {
            background: rgba(255,255,255,0.12);
            transform: translateX(-4px);
        }
        
        .nav .next {
            background: var(--accent-gradient);
            color: var(--bg-dark);
        }
        
        .nav .next:hover {
            transform: translateX(4px);
            box-shadow: 0 8px 25px rgba(0,245,212,0.4);
        }
        
        .modules {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 32px;
        }
        
        .modules button {
            padding: 12px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        
        .modules button:hover {
            background: rgba(123,44,191,0.2);
            border-color: var(--purple);
            color: var(--text);
        }
        
        .modules button.active {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border-color: transparent;
            color: white;
        }
        
        .modules button i {
            margin-right: 6px;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .slide-body { padding: 24px; }
            .slide-title { font-size: 1.6em; }
            .nav { flex-direction: column; gap: 12px; }
            .modules { gap: 8px; }
            .modules button { padding: 10px 14px; font-size: 0.8em; }
            .slide-header { flex-direction: column; gap: 12px; text-align: center; }
            .slide-header .left { justify-content: center; }
        }
    </style>
</head>

        var modAtual = 0;
        var slideAtual = 0;

        function mostrarSlide() {
            var m = modulos[modAtual];
            var s = m.slides[slideAtual];
            
            document.getElementById('modTitle').innerText = m.titulo;
            document.getElementById('slideTitle').innerText = s.titulo;
            document.getElementById('slideNum').innerText = slideAtual + 1;
            document.getElementById('slideTotal').innerText = m.slides.length;
            document.getElementById('slideContent').innerHTML = s.conteudo;
            
            var total = 0, atual = 0;
            for(var i=0; i<modulos.length; i++) {
                total += modulos[i].slides.length;
                if(i < modAtual) atual += modulos[i].slides.length;
                if(i === modAtual) atual += slideAtual;
            }
            document.getElementById('progress').style.width = ((atual+1) / total * 100) + '%';
            
            var botoes = document.querySelectorAll('.modules button');
            botoes.forEach(function(b, i) {
                b.className = (i === modAtual) ? 'active' : '';
            });
        }

        function mudarSlide(dir) {
            var ts = modulos[modAtual].slides.length;
            slideAtual += dir;
            if (slideAtual < 0) {
                if (modAtual > 0) { modAtual--; slideAtual = modulos[modAtual].slides.length - 1; }
                else slideAtual = 0;
            } else if (slideAtual >= ts) {
                if (modAtual < modulos.length - 1) { modAtual++; slideAtual = 0; }
                else slideAtual = ts - 1;
            }
            mostrarSlide();
        }

        function irParaModulo(idx) { modAtual = idx; slideAtual = 0; mostrarSlide(); }

        function criarBotoes() {
            var html = '';
            modulos.forEach(function(m, i) {
                html += '<button onclick="irParaModulo(' + i + ')"><i class="fas ' + m.icone + '"></i> ' + m.titulo + '</button>';
            });
            document.getElementById('modulesList').innerHTML = html;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') mudarSlide(1);
            if (e.key === 'ArrowLeft') mudarSlide(-1);
        });

        criarBotoes();
        mostrarSlide();
    </script>
