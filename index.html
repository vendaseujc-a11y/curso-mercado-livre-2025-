        let currentModule = 0;
        let currentSlide = 0;

        function renderSlide() {
            const module = courseData[currentModule];
            const slide = module.slides[currentSlide];
            
            document.getElementById('currentModule').textContent = currentModule + 1;
            document.getElementById('totalModules').textContent = courseData.length;
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('totalSlides').textContent = module.slides.length;

            const colorMap = {
                blue: 'blue', green: 'green', purple: 'purple', orange: 'orange',
                pink: 'pink', indigo: 'indigo', teal: 'teal', red: 'red', cyan: 'cyan'
            };
            const color = colorMap[module.color] || 'yellow';

            document.getElementById('slideContent').innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-${color}-100 rounded-full flex items-center justify-center text-${color}-600">
                        <i class="fas ${module.icon}"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2>
                </div>
                ${slide.content}
            `;

            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === module.slides.length - 1;

            renderDots();
        }

        function renderDots() {
            const module = courseData[currentModule];
            const dotsContainer = document.getElementById('progressDots');
            let dots = '';
            
            for (let i = 0; i < module.slides.length; i++) {
                dots += `<button onclick="goToSlide(${i})" class="w-3 h-3 rounded-full ${i === currentSlide ? 'bg-yellow-500' : 'bg-gray-300'} transition"></button>`;
            }
            dotsContainer.innerHTML = dots;
        }

        function changeSlide(direction) {
            const module = courseData[currentModule];
            const newSlide = currentSlide + direction;
            
            if (newSlide >= 0 && newSlide < module.slides.length) {
                currentSlide = newSlide;
                renderSlide();
            }
        }

        function goToSlide(slideIndex) {
            currentSlide = slideIndex;
            renderSlide();
        }

        function goToModule(moduleIndex) {
            currentModule = moduleIndex;
            currentSlide = 0;
            renderSlide();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        renderSlide();
    </script>
