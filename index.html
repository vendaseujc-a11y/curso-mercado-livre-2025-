<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Mercado Livre 2025-2026 - Guia Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --accent: #00f5d4;
            --accent-secondary: #7b2cbf;
            --accent-gradient: linear-gradient(135deg, #00f5d4, #00bbf9);
            --pink: #f72585;
            --purple: #7b2cbf;
            --blue: #00bbf9;
            --cyan: #00f5d4;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --border: rgba(255,255,255,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(123,44,191,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,245,212,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(247,37,133,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        
        .header {
            background: linear-gradient(180deg, rgba(123,44,191,0.3) 0%, transparent 100%);
            padding: 50px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        
        .header h1 {
            font-size: 3em;
            font-weight: 800;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        
        .header p {
            font-size: 1.15em;
            color: var(--text-muted);
            font-weight: 400;
        }
        
        .badge {
            display: inline-block;
            background: rgba(0,245,212,0.15);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(0,245,212,0.3);
        }
        
        .container {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .progress-track {
            background: rgba(255,255,255,0.05);
            height: 4px;
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            background: var(--accent-gradient);
            height: 100%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(0,245,212,0.5);
        }
        
        .slide-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5),
                0 0 0 1px var(--border);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .slide-header {
            background: linear-gradient(90deg, var(--purple), var(--pink));
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .slide-header .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .slide-header .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            backdrop-filter: blur(10px);
        }
        
        .slide-header h2 {
            font-size: 1.25em;
            font-weight: 600;
        }
        
        .slide-header .subtitle {
            font-size: 0.9em;
            opacity: 0.85;
            margin-top: 3px;
        }
        
        .slide-header .slide-counter {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .slide-body {
            padding: 42px;
            min-height: 520px;
        }
        
        .slide-title {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .slide-title i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .content h3 {
            color: var(--cyan);
            font-size: 1.35em;
            margin: 32px 0 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .content h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }
        
        .content p {
            color: var(--text-muted);
            font-size: 1.08em;
            margin-bottom: 16px;
            line-height: 1.75;
        }
        
        .content ul, .content ol {
            margin: 16px 0 20px 28px;
        }
        
        .content li {
            color: var(--text-muted);
            margin-bottom: 14px;
            font-size: 1.05em;
            line-height: 1.6;
        }
        
        .content strong {
            color: var(--text);
        }
        
        .box {
            padding: 22px 26px;
            border-radius: 16px;
            margin: 24px 0;
            border: 1px solid;
            backdrop-filter: blur(10px);
        }
        
        .box-dica {
            background: rgba(0,245,212,0.08);
            border-color: rgba(0,245,212,0.3);
        }
        
        .box-dica h4 { color: var(--cyan); }
        
        .box-contato {
            background: rgba(37, 211, 102, 0.1);
            border-color: rgba(37, 211, 102, 0.4);
        }
        
        .box-contato h4 { color: #25d366; }
        
        .box-contato a {
            color: #25d366;
            text-decoration: none;
            font-weight: 600;
        }
        
        .box-contato a:hover {
            text-decoration: underline;
        }
        
        .box-atencao {
            background: rgba(247,37,133,0.08);
            border-color: rgba(247,37,133,0.3);
        }
        
        .box-atencao h4 { color: var(--pink); }
        
        .box-info {
            background: rgba(0,187,249,0.08);
            border-color: rgba(0,187,249,0.3);
        }
        
        .box-info h4 { color: var(--blue); }
        
        .box h4 {
            font-size: 1.05em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 22px 0;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        th {
            background: linear-gradient(90deg, var(--purple), var(--pink));
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }
        
        tr:hover { background: rgba(255,255,255,0.03); }
        
        tr:last-child td { border-bottom: none; }
        
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 24px 32px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
        }
        
        .nav button {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Outfit', sans-serif;
        }
        
        .nav .prev {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }
        
        .nav .prev:hover {
            background: rgba(255,255,255,0.12);
            transform: translateX(-4px);
        }
        
        .nav .next {
            background: var(--accent-gradient);
            color: var(--bg-dark);
        }
        
        .nav .next:hover {
            transform: translateX(4px);
            box-shadow: 0 8px 25px rgba(0,245,212,0.4);
        }
        
        .modules {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 32px;
        }
        
        .modules button {
            padding: 12px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        
        .modules button:hover {
            background: rgba(123,44,191,0.2);
            border-color: var(--purple);
            color: var(--text);
        }
        
        .modules button.active {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border-color: transparent;
            color: white;
        }
        
        .modules button i {
            margin-right: 6px;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .login-overlay.hidden { display: none; }
        
        .login-box {
            background: var(--bg-card);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: var(--bg-dark);
            margin: 0 auto 24px;
        }
        
        .login-box h2 {
            font-size: 1.8em;
            margin-bottom: 8px;
        }
        
        .login-box p {
            color: var(--text-muted);
            margin-bottom: 32px;
        }
        
        .login-box input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            color: var(--text);
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            box-shadow: 0 8px 25px rgba(0,245,212,0.4);
        }
        
        .login-error {
            color: var(--pink);
            margin-top: 16px;
            font-size: 0.9em;
        }
        
        .toggle-link {
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 0.9em;
        }
        
        .toggle-link a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .toggle-link a:hover {
            text-decoration: underline;
        }
        
        .github-btn {
            width: 100%;
            padding: 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .github-btn:hover {
            background: #555;
        }
        
        .divider {
            margin: 20px 0;
            text-align: center;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            background: var(--bg-card);
            padding: 0 16px;
            position: relative;
            color: var(--text-muted);
            font-size: 0.85em;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .slide-body { padding: 24px; }
            .slide-title { font-size: 1.6em; }
            .nav { flex-direction: column; gap: 12px; }
            .modules { gap: 8px; }
            .modules button { padding: 10px 14px; font-size: 0.8em; }
            .slide-header { flex-direction: column; gap: 12px; text-align: center; }
            .slide-header .left { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="login-logo"><i class="fas fa-bolt"></i></div>
            <h2>Curso Mercado Livre</h2>
            <p id="loginSubtitle">Faça login para continuar</p>
            
            <form id="loginForm">
                <input type="text" id="nome" placeholder="Seu nome" style="display:none;">
                <input type="text" id="login" placeholder="Login (mínimo 3 caracteres)" required>
                <input type="password" id="senha" placeholder="Senha (mínimo 3 caracteres)" required>
                <button type="submit" class="login-btn" id="btnSubmit">Entrar</button>
            </form>
            
            <p class="toggle-link">
                <span id="toggleText">Não tem conta?</span> 
                <a href="#" onclick="toggleCadastro(event)"> <span id="toggleAction">Cadastre-se</span></a>
            </p>
            <p class="login-error" id="loginError"></p>
        </div>
    </div>
    
    <div class="header">
        <div class="badge"><i class="fas fa-bolt"></i> Curso 2025-2026</div>
        <h1>Guía Mercado Livre</h1>
        <p>Do zero ao avançado: lucre no maior marketplace do Brasil</p>
    </div>
    
    <div class="container">
        <div class="progress-track">
            <div class="progress-bar" id="progress" style="width: 11%"></div>
        </div>
        
        <div class="slide-card">
            <div class="slide-header">
                <div class="left">
                    <div class="icon-box"><i class="fas fa-book-open"></i></div>
                    <div>
                        <h2 id="modTitle">Módulo 1</h2>
                        <div class="subtitle" id="slideTitle">Título do Slide</div>
                    </div>
                </div>
                <div class="slide-counter">
                    <span id="slideNum">1</span>/<span id="slideTotal">1</span>
                </div>
            </div>
            
            <div class="slide-body">
                <div class="content" id="slideContent"></div>
            </div>
            
            <div class="nav">
                <button class="prev" onclick="mudarSlide(-1)">
                    <i class="fas fa-arrow-left"></i> Anterior
                </button>
                <button class="next" onclick="mudarSlide(1)">
                    Próximo <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
        
        <div class="modules" id="modulesList"></div>
    </div>

    <script>
        var modulos = [
            {
                titulo: "1. Cadastro",
                icone: "fa-user-plus",
                slides: [
                    {
                        titulo: "Como Criar sua Conta",
                        conteudo: `
                            <div class="content">
                                <h3>Escolha o Tipo de Conta</h3>
                                <ul>
                                    <li><strong>Conta pessoal:</strong> Ideal para comprar ou vender itens usados (CPF)</li>
                                    <li><strong>Conta empresa:</strong> Para vender profissionalmente, emissão de notas fiscais (CNPJ)</li>
                                </ul>
                                
                                <h3>Passo a Passo do Cadastro</h3>
                                <ol>
                                    <li><strong>Acesse:</strong> mercadolivre.com.br ou baixe o app</li>
                                    <li><strong>Clique:</strong> "Crie a sua conta"</li>
                                    <li><strong>Valide:</strong> E-mail, telefone e identidade (selfie + foto RG/CNH)</li>
                                    <li><strong>Senha:</strong> Crie uma senha forte</li>
                                </ol>
                                
                                <div class="box box-dica">
                                    <h4><i class="fas fa-lightbulb"></i> Dica</h4>
                                    <p>Ative a <strong>Verificação em duas etapas</strong> para maior segurança!</p>
                                </div>
                                
                                <div class="box box-atencao">
                                    <h4><i class="fas fa-exclamation-triangle"></i> Importante</h4>
                                    <p>Use dados reais. O ML cruza informações com a Receita Federal.</p>
                                </div>
                            </div>
                        `
                    }
                ]
            },
            {
                titulo: "2. Taxas ML",
                icone: "fa-percentage",
                slides: [
                    {
                        titulo: "Tipos de Anúncio",
                        conteudo: `
                            <div class="content">
                                <h3>Tarifas de Venda</h3>
                                <p>Comissão cobrada apenas quando a venda é concretizada:</p>
                                
                                <table>
                                    <tr><th>Tipo</th><th>Comissão</th><th>Parcelamento</th></tr>
                                    <tr><td>Grátis</td><td>0%</td><td>Com juros</td></tr>
                                    <tr><td>Clássico</td><td>10% - 14%</td><td>Com juros</td></tr>
                                    <tr><td>Premium</td><td>15% - 19%</td><td>Sem juros</td></tr>

                                <div class="box box-dica">

                                    <li>R$ 29 a R$ 50: R$ 6,50/unid</li>
                                    <li>R$ 50 a R$ 78,99: R$ 6,75/unid</li>
                                    <li><strong>Acima de R$ 79: R$ 0,00</strong></li>
                                </ul>
                                
                                <div class="box box-atencao">
                                    <h4><i class="fas fa-bolt"></i> Resumo</h4>
                                    <p>Venda acima de <strong>R$ 79</strong> para evitar taxa fixa e ativar Full!</p>
                                </div>
                            </div>
                        `
                    },
                    {
                        titulo: "Exemplos Práticos",
                        conteudo: `
                            <div class="content">
                                <h3>Exemplo 1: Venda de R$ 50 (Clássico)</h3>
                                <ul>
                                    <li>Comissão (12%): R$ 6,00</li>
                                    <li>Taxa fixa: R$ 6,50</li>
                                    <li><strong>Total: R$ 12,50</strong></li>
                                </ul>
                                
                                <h3>Exemplo 2: Venda de R$ 150 (Premium)</h3>
                                <ul>
                                    <li>Comissão (17%): R$ 25,50</li>
                                    <li>Frete grátis: varia</li>
                                    <li><strong>Sem taxa fixa!</strong></li>
                                </ul>
                                
                                <div class="box box-atencao">
                                    <h4><i class="fas fa-exclamation-triangle"></i> Conclusão</h4>
                                    <p><strong>Produtos barato:</strong> taxa fixa é o maior desafio.</p>
                                    <p><strong>Produtos caro:</strong> foque no Premium para converter mais.</p>
                                </div>
                            </div>
                        `
                    }
                ]
            },
            {
                titulo: "3. Produtos",
                icone: "fa-search",
                slides: [
                    {
                        titulo: "Estratégia de Pesquisa",
                        conteudo: `
                            <div class="content">
                                <h3>1. Ferramenta "Tendências" do ML</h3>
                                <p>Acesse: <strong>tendencias.mercadolibre.com.br</strong></p>
                                <p>Busque termos específicos de nicho.</p>
                                
                                <h3>2. Regra do Ticket Médio</h3>
                                <ul>
                                    <li><strong>Por que R$ 79?</strong> Frete grátis obrigatório. Permite embutir o custo.</li>
                                    <li><strong>Evite:</strong> Produtos abaixo de R$ 30 sem escala</li>
                                </ul>
                                
                                <h3>3. Gap de Qualidade</h3>
                                <p>Encontre produtos com muitas vendas mas avaliações ruins (3★). Resolva o problema!</p>
                                
                                <h3>4. Critérios de Produto Winner</h3>
                                <ul>
                                    <li>✓ Não sazonal (vende o ano todo)</li>
                                    <li>✓ Baixa fragilidade</li>
                                    <li>✓ Recorrência ou necessidade</li>
                                    <li>✓ Dimensões pequenas</li>
                                </ul>
                                
                                <div class="box box-dica">
                                    <h4><i class="fas fa-gem"></i> Micro-Nichos</h4>
                                    <p>Quanto mais específico o nicho, menor a guerra de preços!</p>
                                </div>
                            </div>
                        `
                    }
                ]
            },
            {
                titulo: "4. Fornecedores",
                icone: "fa-boxes",
                slides: [
                    {
                        titulo: "Onde Encontrar",
                        conteudo: `
                            <div class="content">
                                <h3>1. Polos Atacadistas (SP)</h3>
                                <ul>
                                    <li><strong>Brás e Bom Retiro:</strong> Moda, vestuário</li>
                                    <li><strong>Rua 25 de Março:</strong> Eletrônicos, gadgets</li>
                                    <li><strong>Santa Ifigênia:</strong> Eletrônicos</li>
                                </ul>

                if(i === modAtual) atual += slideAtual;
            }
            document.getElementById('progress').style.width = ((atual+1) / total * 100) + '%';
            
            var botoes = document.querySelectorAll('.modules button');
            botoes.forEach(function(b, i) {
                b.className = (i === modAtual) ? 'active' : '';
            });
        }

        function mudarSlide(dir) {
            var ts = modulos[modAtual].slides.length;
            slideAtual += dir;
            if (slideAtual < 0) {
                if (modAtual > 0) { modAtual--; slideAtual = modulos[modAtual].slides.length - 1; }
                else slideAtual = 0;
            } else if (slideAtual >= ts) {
                if (modAtual < modulos.length - 1) { modAtual++; slideAtual = 0; }
                else slideAtual = ts - 1;
            }
            mostrarSlide();
        }

        function irParaModulo(idx) { modAtual = idx; slideAtual = 0; mostrarSlide(); }

        function criarBotoes() {
            var html = '';
            modulos.forEach(function(m, i) {
                html += '<button onclick="irParaModulo(' + i + ')"><i class="fas ' + m.icone + '"></i> ' + m.titulo + '</button>';
            });
            document.getElementById('modulesList').innerHTML = html;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') mudarSlide(1);
            if (e.key === 'ArrowLeft') mudarSlide(-1);
        });

        criarBotoes();
        mostrarSlide();
        
        var isCadastro = false;
        
        function toggleCadastro(e) {
            if(e) e.preventDefault();
            isCadastro = !isCadastro;
            
            var nomeInput = document.getElementById('nome');
            var loginSubtitle = document.getElementById('loginSubtitle');
            var btnSubmit = document.getElementById('btnSubmit');
            var toggleText = document.getElementById('toggleText');
            var toggleAction = document.getElementById('toggleAction');
            
            if(isCadastro) {
                nomeInput.style.display = 'block';
                loginSubtitle.textContent = 'Crie sua conta';
                btnSubmit.textContent = 'Cadastrar';
                toggleText.textContent = 'Já tem conta?';
                toggleAction.textContent = 'Faça login';
            } else {
                nomeInput.style.display = 'none';
                loginSubtitle.textContent = 'Faça login para continuar';
                btnSubmit.textContent = 'Entrar';
                toggleText.textContent = 'Não tem conta?';
                toggleAction.textContent = 'Cadastre-se';
            }
            document.getElementById('loginError').textContent = '';
        }
        
        async function loginGitHub() {
            try {
                const response = await fetch('/api/auth/github', { method: 'POST' });
                const data = await response.json();
                if(data.url) {
                    window.location.href = data.url;
                } else {
                    document.getElementById('loginError').textContent = 'Erro ao conectar com GitHub';
                }
            } catch(e) {
                document.getElementById('loginError').textContent = 'Erro ao conectar com GitHub';
            }
        }
        
        async function apiRequest(url, data) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch(e) {
                return { erro: 'Erro de conexão: ' + e.message };
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const login = document.getElementById('login').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const nome = document.getElementById('nome').value.trim();
            const errorEl = document.getElementById('loginError');
            const btnSubmit = document.getElementById('btnSubmit');
            
            if(login.length < 3 || senha.length < 3) {
                errorEl.textContent = 'Login e senha precisam de 3+ caracteres';
                return;
            }
            
            if(isCadastro && nome.length < 2) {
                errorEl.textContent = 'Preencha o nome completo';
                return;
            }
            
            errorEl.textContent = '';
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Aguarde...';
            
            try {
                if(isCadastro) {
                    const ret = await apiRequest('/api/register', { nome, login, senha });
                    if(ret.erro) {
                        errorEl.textContent = ret.erro;
                    } else {
                        alert('Cadastro realizado com sucesso! Agora faça login.');
                        toggleCadastro(new Event('click'));
                    }
                } else {
                    const ret = await apiRequest('/api/login', { login, senha });
                    if(ret.erro) {
                        errorEl.textContent = ret.erro;
                    } else {
                        document.getElementById('loginOverlay').classList.add('hidden');
                        localStorage.setItem('logged', 'true');
                        localStorage.setItem('userName', ret.nome || login);
                    }
                }
            } catch(e) {
                errorEl.textContent = 'Erro: ' + e.message;
            }
            
            btnSubmit.disabled = false;
            btnSubmit.textContent = isCadastro ? 'Cadastrar' : 'Entrar';
        });
        
        if(localStorage.getItem('logged') === 'true') {
            document.getElementById('loginOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
